  <!-- macOS menu-bar template: the AIF brand mark, single-color on a transparent
       background (no tile). The "Template" filename makes the menu bar tint it
       automatically — black on a light bar, white on a dark one. Letter paths are
       lifted verbatim from the brand AIF favicon (aifight-favicon-light.svg); the
       orange F flattens to one color here because the menu bar is monochrome by
       design (the colored mark stays on Windows/Linux + the Dock/app icon). -->
