name: Release

# Push a version tag (e.g. v0.2.0) to build and stage a release:
#   * desktop installers — macOS (.dmg, signed + notarized), Windows (.exe),
#     Linux (.AppImage)
#   * the @aifight/aifight CLI tarball (.tgz)
# Everything is attached to a DRAFT GitHub Release so you can review + edit notes,
# then click Publish. Nothing goes public automatically.
#
# Run `workflow_dispatch` from the Actions tab to dry-run the builds (no release).
#
# Architecture: the runtime (CLI engine) is built ONCE on Linux — where its
# bash/rsync build script runs cleanly — and its dist/ is shared to the per-OS
# desktop jobs as an artifact. So the desktop jobs never run the bash build on
# Windows; they just consume the prebuilt engine and package the installer.
#
# Repo secrets used for signed macOS builds (Settings → Secrets and variables →
# Actions), scoped to the macOS runner only:
#   CSC_LINK, CSC_KEY_PASSWORD                              Developer ID cert (.p12 base64 + password)
#   APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID    notarization
# Windows builds are currently unsigned (SmartScreen "More info → Run anyway").

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only — do not create a release"
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  runtime:
    name: Build runtime (CLI engine + tarball)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Install workspace deps (root)
        run: npm install
      - name: Build runtime (BUILD_ONLY skips env-dependent tests + scratch install)
        env:
          BUILD_ONLY: "1"
        run: npm run build:cli
      - name: Locate CLI tarball
        id: pack
        working-directory: runtime
        run: |
          set -e
          tarball=$(ls aifight-aifight-*.tgz | head -1)
          if [ -z "$tarball" ]; then
            echo "ERROR: build produced no aifight-aifight-*.tgz" >&2
            exit 1
          fi
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"
          echo "tarball: $tarball"
      - name: Upload runtime dist (consumed by the desktop jobs)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: runtime-dist
          path: runtime/dist
          if-no-files-found: error
          retention-days: 3
      - name: Upload CLI tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cli-tarball
          path: runtime/${{ steps.pack.outputs.tarball }}
          if-no-files-found: error
          retention-days: 14

  desktop:
    name: Desktop (${{ matrix.os }})
    needs: runtime
    strategy:
      fail-fast: false
      matrix:
        # macos-latest = Apple Silicon (arm64); macos-15-intel = Intel (x64) — the
        # current Intel runner label (macos-13 was retired 2025-12). Each runner
        # builds its own native arch, so native modules resolve without cross-compile.
        os: [macos-latest, macos-15-intel, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Install workspace deps (root)
        run: npm install
      - name: Restore prebuilt runtime engine
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: runtime-dist
          path: runtime/dist
      - name: Generate runtime schema source
        # desktop bundles the bridge core from ../runtime/src; schema.generated.ts
        # is git-ignored (generated), so produce it before esbuild runs.
        run: npm -w @aifight/aifight run gen:schema
      - name: Import Apple signing certificate (macOS)
        # Put the Developer ID cert in a SEARCHABLE keychain so both electron-builder
        # (app signing, via auto-discovery) and the afterAllArtifactBuild hook (dmg
        # codesign) can find the identity. Passing CSC_LINK to electron-builder
        # instead lands the cert in a private temp keychain the dmg signing can't see.
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/aifight-signing.keychain-db"
          KPASS="$(openssl rand -base64 24)"
          CERT="$RUNNER_TEMP/aifight-cert.p12"
          node -e 'require("fs").writeFileSync(process.argv[1], Buffer.from(process.env.CSC_LINK, "base64"))' "$CERT"
          security create-keychain -p "$KPASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPASS" "$KEYCHAIN"
          security import "$CERT" -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPASS" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/[",]//g')
          rm -f "$CERT"
          security find-identity -v -p codesigning
      - name: Package desktop installer
        working-directory: desktop
        # macOS signs via the keychain imported above (auto-discovery on). Windows
        # and Linux have no cert → auto-discovery off → unsigned builds.
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'macOS' && 'true' || 'false' }}
          APPLE_ID: ${{ runner.os == 'macOS' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ runner.os == 'macOS' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ runner.os == 'macOS' && secrets.APPLE_TEAM_ID || '' }}
        run: npm run package
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: desktop-${{ matrix.os }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.exe
            desktop/release/*.AppImage
            desktop/release/*.blockmap
            desktop/release/latest*.yml
          if-no-files-found: ignore
          retention-days: 14

  release:
    name: Draft GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [runtime, desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
      - name: Collect release files
        run: |
          set -e
          mkdir -p dist
          # Installers + CLI tarball only — the runtime-dist artifact is build
          # plumbing (.mjs/.d.ts) and is intentionally not matched here.
          find artifacts -type f \( \
            -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o \
            -name '*.AppImage' -o -name '*.tgz' -o \
            -name '*.blockmap' -o -name 'latest*.yml' \) \
            -exec cp -n {} dist/ \;
          echo "Release files:"
          ls -la dist
      - name: Create draft release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          draft: true
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
          files: dist/*
          body: |
            AIFight client ${{ github.ref_name }}.

            ## Downloads

            | Platform | File | Notes |
            |---|---|---|
            | macOS (Apple Silicon) | `*-arm64.dmg` | signed & notarized |
            | macOS (Intel) | `*-x64.dmg` | signed & notarized |
            | Windows | `*.exe` | unsigned — on first run click **More info → Run anyway** |
            | Linux | `*.AppImage` | `chmod +x` then run |
            | CLI | `npm install -g @aifight/aifight` | any OS / arch — or the `*.tgz` here |

            Bring your own LLM — your API key stays on your machine and never
            touches our servers.
